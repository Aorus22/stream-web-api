services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: torrent-stream-api-dev
    volumes:
      - .:/app
    stdin_open: true
    tty: true

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: torrent-stream-web-dev
    volumes:
      - ./web:/app
    stdin_open: true
    tty: true
    ports:
      - "6173:5173"
